<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Calculator</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background-elements">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
</div>

<div class="calculator">

    <!-- Display -->
    <div class="display">
        <div id="history" class="history"></div>
        <div id="expression" class="current-expression">0</div>
    </div>

    <!-- Keypad -->
    <div class="keypad">

        <!-- Scientific Row 1 -->
        <button class="btn btn-sci" data-val="sin(">sin</button>
        <button class="btn btn-sci" data-val="cos(">cos</button>
        <button class="btn btn-sci" data-val="tan(">tan</button>
        <button class="btn btn-sci" data-val="log10(">log</button>

        <!-- Scientific Row 2 -->
        <button class="btn btn-sci" data-val="sqrt(">√</button>
        <button class="btn btn-sci" data-val="^">xʸ</button>
        <button class="btn btn-sci" data-val="(">(</button>
        <button class="btn btn-sci" data-val=")">)</button>

        <!-- Scientific Row 3 -->
        <button class="btn btn-sci" data-val="pi">π</button>
        <button class="btn btn-sci" data-val="e">e</button>
        <button class="btn btn-action" id="clear">C</button>
        <button class="btn btn-action" id="delete">DEL</button>

        <!-- Calculator -->
        <button class="btn" data-val="7">7</button>
        <button class="btn" data-val="8">8</button>
        <button class="btn" data-val="9">9</button>
        <button class="btn btn-operator" data-val="/">÷</button>

        <button class="btn" data-val="4">4</button>
        <button class="btn" data-val="5">5</button>
        <button class="btn" data-val="6">6</button>
        <button class="btn btn-operator" data-val="*">×</button>

        <button class="btn" data-val="1">1</button>
        <button class="btn" data-val="2">2</button>
        <button class="btn" data-val="3">3</button>
        <button class="btn btn-operator" data-val="-">−</button>

        <button class="btn" data-val="0" style="grid-column: span 2;">0</button>
        <button class="btn" data-val=".">.</button>
        <button class="btn btn-operator" data-val="+">+</button>

        <button class="btn btn-equal" id="equals" style="grid-column: span 4;">=</button>

    </div>

</div>

<!-- Math.js -->
<script src="https://cdn.jsdelivr.net/npm/mathjs@14/lib/browser/math.js"></script>

<!-- Your JavaScript -->
<script src="script.js"></script>

</body>
</html>
